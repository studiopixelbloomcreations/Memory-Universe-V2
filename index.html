<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Universe</title>

    <!-- CDN Dependencies with Fallbacks -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.4/dist/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='80'>🌌</text></svg>">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #07070f;
            color: #e2e8f0;
            overflow: hidden;
            height: 100vh;
        }

        #canvas { display: block; width: 100%; height: 100%; }

        #viewer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #studio { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; }

        /* VIEWER */
        .studio-btn {
            position: fixed; bottom: 24px; left: 24px; z-index: 100;
            background: rgba(10,5,20,0.7); backdrop-filter: blur(16px);
            border: 1px solid rgba(192,132,252,0.25);
            border-radius: 12px; padding: 10px 18px;
            color: #c084fc; cursor: pointer; font-size: 13px;
            transition: all 0.2s;
        }
        .studio-btn:hover { border-color: #c084fc; box-shadow: 0 0 20px rgba(192,132,252,0.3); }

        /* STUDIO */
        .studio-container {
            display: flex; width: 100%; height: 100%;
        }

        .sidebar {
            width: 280px; background: #0f0f1a;
            border-right: 1px solid rgba(255,255,255,0.08);
            padding: 24px; overflow-y: auto;
        }

        .main {
            flex: 1; display: flex; flex-direction: column;
            padding: 24px; overflow-y: auto;
        }

        .btn {
            background: linear-gradient(135deg, #7c3aed, #db2777);
            border: none; color: white; padding: 14px 24px;
            border-radius: 12px; font-weight: 600; cursor: pointer;
            width: 100%; margin-bottom: 12px; transition: all 0.2s;
        }
        .btn:hover { transform: scale(1.025); }

        .upload-zone {
            border: 2px dashed rgba(192,132,252,0.35);
            border-radius: 16px; padding: 40px; text-align: center;
            cursor: pointer; transition: all 0.2s;
            background: rgba(192,132,252,0.02);
        }
        .upload-zone:hover, .upload-zone.drag-over {
            border-color: #c084fc; background: rgba(192,132,252,0.08);
        }

        .photo-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px; margin-top: 20px;
        }

        .photo-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px; padding: 16px;
            transition: all 0.2s;
        }
        .photo-card:hover {
            border-color: rgba(192,132,252,0.3);
        }

        .photo-thumb {
            width: 100%; height: 140px;
            background: #0a0a14; border-radius: 8px;
            object-fit: cover; margin-bottom: 12px;
        }

        input, textarea {
            width: 100%; padding: 8px 12px;
            background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px; color: #e2e8f0; font-family: Inter;
            margin-bottom: 8px; font-size: 13px;
        }
        input:focus, textarea:focus {
            outline: none; border-color: #c084fc;
            box-shadow: 0 0 0 3px rgba(192,132,252,0.18);
        }

        .fade { position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; opacity: 0; pointer-events: none; z-index: 999; }

        .loading {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8); padding: 40px;
            border-radius: 12px; color: white; z-index: 9999;
            text-align: center; font-family: Inter;
        }

        .loading div { font-size: 18px; margin-bottom: 16px; }
        .progress { width: 200px; height: 4px; background: rgba(255,255,255,0.2);
            border-radius: 2px; margin: 0 auto; overflow: hidden; }
        .progress div { width: 30%; height: 100%; background: #c084fc;
            animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0%, 100% { width: 30%; }
            50% { width: 70%; }
        }
    </style>
</head>
<body>
    <div class="fade" id="fade"></div>

    <div id="viewer">
        <canvas id="canvas"></canvas>
        <button class="studio-btn" onclick="app.switchMode('studio')">⚙ Studio (S)</button>
    </div>

    <div id="studio">
        <div class="studio-container">
            <div class="sidebar">
                <h2 style="margin-bottom: 20px; font-size: 18px;">🌌 Memory</h2>
                <button class="btn" onclick="app.switchMode('viewer')">▶ LAUNCH</button>
                <button class="btn" id="upload-btn" style="background: #666;">+ Upload</button>
                <input type="file" id="file-input" multiple accept="image/*" style="display:none;">
            </div>
            <div class="main">
                <div class="upload-zone" id="upload-zone">
                    <div style="font-size: 48px; margin-bottom: 12px;">☁</div>
                    <div style="font-size: 16px; margin-bottom: 8px;">Drop photos here</div>
                    <div style="font-size: 13px; color: rgba(255,255,255,0.45);">JPG · PNG · WEBP</div>
                </div>
                <div class="photo-grid" id="photo-grid"></div>
            </div>
        </div>
    </div>

    <div class="loading" id="loading">
        <div>Loading Memory Universe...</div>
        <div class="progress"><div></div></div>
    </div>

    <script>
        class App {
            constructor() {
                this.mode = null;
                this.photos = [];
                this.scene = null;
                this.camera = null;
                this.renderer = null;
                this.particles = null;
            }

            async init() {
                try {
                    // Check network first
                    const hasNetwork = await this.checkNetwork();
                    if (!hasNetwork) {
                        throw new Error('No internet connection detected');
                    }

                    // Wait for libraries
                    await this.waitLibs();
                    console.log('✓ Libraries loaded');

                    // Init IndexedDB
                    this.db = await this.initDB();
                    console.log('✓ Database ready');

                    // Load photos
                    this.photos = await this.loadPhotos();
                    console.log('✓ Photos loaded:', this.photos.length);

                    // Setup Three.js
                    await this.setupThree();
                    console.log('✓ Three.js ready');

                    // Setup UI
                    this.setupUI();
                    console.log('✓ UI ready');

                    // Auto-determine mode
                    const startMode = this.photos.length === 0 ? 'studio' : 'viewer';
                    this.switchMode(startMode);

                    document.getElementById('loading').style.display = 'none';
                } catch (err) {
                    console.error('Init error:', err);
                    document.getElementById('loading').innerHTML = `
                        <div style="color: #ff6464; font-size: 18px;">⚠️ Error Loading</div>
                        <div style="color: #aaa; font-size: 12px; margin-top: 12px; max-width: 300px; line-height: 1.6;">
                            ${err.message}
                            <br><br>
                            <strong>Troubleshooting:</strong>
                            <br>• Check your internet connection
                            <br>• Try refreshing the page (Ctrl+Shift+R)
                            <br>• Check browser console (F12) for blocked scripts
                            <br>• Try a different browser
                        </div>
                    `;
                }
            }

            async checkNetwork() {
                try {
                    const response = await fetch('https://cdn.jsdelivr.net/npm/three@0.160.0/package.json', { mode: 'no-cors' });
                    return response.ok || response.status === 0;
                } catch (e) {
                    console.warn('Network check failed:', e);
                    return false;
                }
            }

            waitLibs() {
                return new Promise((resolve, reject) => {
                    let checkCount = 0;
                    const maxChecks = 300; // 30 seconds at 100ms intervals

                    const check = () => {
                        checkCount++;

                        // Log progress every 2 seconds
                        if (checkCount % 20 === 0) {
                            console.log(`Waiting for CDN (${checkCount/10}s)... THREE: ${typeof THREE}, GSAP: ${typeof gsap}`);
                        }

                        if (typeof THREE !== 'undefined' && typeof gsap !== 'undefined') {
                            console.log('✓ Libraries loaded');
                            resolve();
                        } else if (checkCount >= maxChecks) {
                            console.error('CDN load failed - Libraries:', { THREE: typeof THREE, GSAP: typeof gsap });
                            reject(new Error('CDN failed to load after 30 seconds. Check: 1) Internet connection 2) Browser console for blocked scripts 3) Try refreshing'));
                        } else {
                            setTimeout(check, 100);
                        }
                    };

                    check();
                });
            }

            async initDB() {
                return new Promise((resolve) => {
                    try {
                        const req = indexedDB.open('memory-universe-v1', 1);
                        req.onerror = () => resolve(null);
                        req.onsuccess = () => resolve(req.result);
                        req.onupgradeneeded = (e) => {
                            const db = e.target.result;
                            if (!db.objectStoreNames.contains('photos')) {
                                db.createObjectStore('photos', { keyPath: 'id' });
                            }
                        };
                    } catch (e) {
                        resolve(null);
                    }
                });
            }

            async loadPhotos() {
                if (!this.db) return [];
                return new Promise((resolve) => {
                    try {
                        const tx = this.db.transaction('photos', 'readonly');
                        const req = tx.objectStore('photos').getAll();
                        req.onsuccess = () => resolve(req.result.sort((a, b) => a.order - b.order));
                        req.onerror = () => resolve([]);
                    } catch (e) {
                        resolve([]);
                    }
                });
            }

            async setupThree() {
                const canvas = document.getElementById('canvas');

                // Renderer
                this.renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setClearColor(0x020408);

                // Scene
                this.scene = new THREE.Scene();

                // Camera
                const aspect = window.innerWidth / window.innerHeight;
                this.camera = new THREE.PerspectiveCamera(65, aspect, 0.1, 1000);
                this.camera.position.z = 20;

                // Lighting
                this.scene.add(new THREE.AmbientLight(0x1a0a2e, 0.4));
                const light = new THREE.PointLight(0xc084fc, 2);
                light.position.set(0, 8, 6);
                this.scene.add(light);

                // Skybox (simple background)
                const geom = new THREE.SphereGeometry(200, 32, 32);
                const mat = new THREE.MeshBasicMaterial({ color: 0x0a1a2e, side: THREE.BackSide });
                this.scene.add(new THREE.Mesh(geom, mat));

                // Particles
                this.createParticles();

                // Render loop
                this.renderer.setAnimationLoop(() => this.render());

                // Resize handler
                window.addEventListener('resize', () => this.onResize());
            }

            createParticles() {
                const count = 800;
                const geom = new THREE.BufferGeometry();
                const positions = new Float32Array(count * 3);

                for (let i = 0; i < count; i++) {
                    positions[i * 3] = (Math.random() - 0.5) * 90;
                    positions[i * 3 + 1] = (Math.random() - 0.5) * 90;
                    positions[i * 3 + 2] = (Math.random() - 0.5) * 90;
                }

                geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                const mat = new THREE.PointsMaterial({ color: 0xc084fc, size: 0.1, transparent: true, opacity: 0.6 });
                this.particles = new THREE.Points(geom, mat);
                this.scene.add(this.particles);
            }

            setupUI() {
                document.getElementById('upload-btn').addEventListener('click', () => {
                    document.getElementById('file-input').click();
                });

                document.getElementById('file-input').addEventListener('change', (e) => this.handleFiles(e.target.files));

                const zone = document.getElementById('upload-zone');
                zone.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    zone.classList.add('drag-over');
                });
                zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
                zone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    zone.classList.remove('drag-over');
                    this.handleFiles(e.dataTransfer.files);
                });

                document.addEventListener('keydown', (e) => {
                    if (e.key === 'v' || e.key === 'V') this.switchMode('viewer');
                    if (e.key === 's' || e.key === 'S' || e.key === 'Escape') this.switchMode('studio');
                });

                this.renderPhotos();
            }

            async handleFiles(files) {
                for (const file of files) {
                    if (!file.type.startsWith('image/')) continue;
                    if (file.size > 10 * 1024 * 1024) continue;

                    const photo = {
                        id: Math.random().toString(36).substr(2, 9),
                        order: this.photos.length,
                        blob: file,
                        title: file.name.split('.')[0],
                        caption: '',
                        duration: 15
                    };

                    this.photos.push(photo);
                    if (this.db) {
                        const tx = this.db.transaction('photos', 'readwrite');
                        tx.objectStore('photos').add(photo);
                    }

                    this.renderPhotos();
                }
            }

            renderPhotos() {
                const grid = document.getElementById('photo-grid');
                grid.innerHTML = '';

                this.photos.forEach((photo, idx) => {
                    const card = document.createElement('div');
                    card.className = 'photo-card';

                    const url = URL.createObjectURL(photo.blob);

                    card.innerHTML = `
                        <img src="${url}" class="photo-thumb" alt="photo">
                        <input type="text" placeholder="Title" value="${photo.title}"
                            onchange="app.updatePhoto(${idx}, 'title', this.value)">
                        <textarea placeholder="Caption"
                            onchange="app.updatePhoto(${idx}, 'caption', this.value)">${photo.caption}</textarea>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <label>Duration: <span>${photo.duration}s</span></label>
                            <input type="range" min="8" max="30" value="${photo.duration}"
                                style="width: 60%; margin: 0;" onchange="app.updatePhoto(${idx}, 'duration', parseInt(this.value)); this.previousElementSibling.querySelector('span').textContent = this.value + 's';">
                        </div>
                        <button style="background: #ff6464; color: white; padding: 8px; border: none; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 8px;"
                            onclick="app.deletePhoto(${idx})">Delete</button>
                    `;

                    grid.appendChild(card);
                });
            }

            updatePhoto(idx, field, value) {
                if (this.photos[idx]) {
                    this.photos[idx][field] = value;
                    if (this.db) {
                        const tx = this.db.transaction('photos', 'readwrite');
                        tx.objectStore('photos').put(this.photos[idx]);
                    }
                }
            }

            deletePhoto(idx) {
                const photo = this.photos[idx];
                this.photos.splice(idx, 1);
                if (this.db && photo.id) {
                    const tx = this.db.transaction('photos', 'readwrite');
                    tx.objectStore('photos').delete(photo.id);
                }
                this.renderPhotos();
            }

            async switchMode(newMode) {
                if (this.mode === newMode) return;

                // Fade
                const fade = document.getElementById('fade');
                await gsap.to(fade, { opacity: 1, duration: 0.4 });

                // Hide current
                document.getElementById('viewer').style.display = 'none';
                document.getElementById('studio').style.display = 'none';

                this.mode = newMode;

                // Show new
                if (newMode === 'viewer') {
                    document.getElementById('viewer').style.display = 'block';
                    this.startSequence();
                } else {
                    document.getElementById('studio').style.display = 'block';
                }

                await gsap.to(fade, { opacity: 0, duration: 0.4 });
            }

            startSequence() {
                if (this.photos.length === 0) return;

                const playPhoto = (idx) => {
                    const photo = this.photos[idx];
                    const duration = Math.max(3, (photo.duration || 8) * 0.6); // 60% faster

                    // Create photo texture
                    const url = URL.createObjectURL(photo.blob);
                    new THREE.TextureLoader().load(url, (texture) => {
                        // Create photo plane
                        const geom = new THREE.PlaneGeometry(4, 2.8);
                        const mat = new THREE.MeshStandardMaterial({
                            map: texture,
                            transparent: true,
                            opacity: 0
                        });
                        const photoMesh = new THREE.Mesh(geom, mat);
                        photoMesh.position.z = 5;
                        photoMesh.scale.set(0.1, 0.1, 0.1);
                        this.scene.add(photoMesh);

                        const tl = gsap.timeline();

                        // Phase 1: Emerge (0.4s)
                        tl.to(photoMesh.position, { z: 0, duration: 0.4, ease: 'power3.out' }, 0);
                        tl.to(photoMesh.scale, { x: 1, y: 1, z: 1, duration: 0.6, ease: 'power2.out' }, 0);
                        tl.to(mat, { opacity: 1, duration: 0.4 }, 0);

                        // Phase 2: Hold/Float (remaining time)
                        tl.to(photoMesh.position, {
                            y: '+=0.05',
                            duration: duration - 1.2,
                            ease: 'sine.inOut',
                            yoyo: true,
                            repeat: 1
                        }, 0.6);

                        // Phase 3: Exit (0.6s)
                        tl.to(photoMesh.scale, { x: 0.05, y: 0.05, z: 0.05, duration: 0.6, ease: 'power2.in' }, duration - 0.6);
                        tl.to(photoMesh.position, { z: -10, duration: 0.6, ease: 'power2.in' }, duration - 0.6);

                        tl.eventCallback('onComplete', () => {
                            this.scene.remove(photoMesh);
                            mat.dispose();
                            geom.dispose();
                            texture.dispose();
                            URL.revokeObjectURL(url);

                            // Next photo
                            if (idx < this.photos.length - 1) {
                                playPhoto(idx + 1);
                            } else {
                                // Loop
                                gsap.delayedCall(1, () => this.startSequence());
                            }
                        });
                    });
                };

                playPhoto(0);
            }

            render() {
                this.renderer.render(this.scene, this.camera);
                if (this.particles) this.particles.rotation.x += 0.0001;
            }

            onResize() {
                const w = window.innerWidth, h = window.innerHeight;
                this.camera.aspect = w / h;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(w, h);
            }
        }

        const app = new App();
        window.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
